{% extends "base.html" %}
{% block title %}Dashboard — AutoFill Cấp Đơn{% endblock %}

{% block content %}
<div x-data="dashboard()" x-init="init()" x-cloak>

  <!-- ── Stats Row ────────────────────────────────────────── -->
  <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-3 mb-4">
    <template x-for="s in sheetList" :key="s.key">
      <div class="card bg-base-100 shadow">
        <div class="card-body p-3 items-center text-center">
          <div class="text-2xl font-bold text-primary" x-text="stats[s.key] ?? '…'"></div>
          <div class="text-xs text-base-content/60" x-text="s.label"></div>
        </div>
      </div>
    </template>
    <!-- Total -->
    <div class="card bg-primary text-primary-content shadow">
      <div class="card-body p-3 items-center text-center">
        <div class="text-2xl font-bold" x-text="stats.total ?? '…'"></div>
        <div class="text-xs opacity-80">Tổng cộng</div>
      </div>
    </div>
  </div>

  <!-- ── Pipeline Control ─────────────────────────────────── -->
  <div class="card bg-base-100 shadow mb-4">
    <div class="card-body p-4">
      <div class="flex flex-wrap items-center gap-3">
        <h2 class="card-title text-base flex-1">⚙️ Điều khiển Pipeline</h2>

        <!-- Status badge -->
        <div class="badge badge-lg"
          :class="{
            'badge-success': pipelineStatus === 'done',
            'badge-warning': pipelineStatus === 'running',
            'badge-error':   pipelineStatus === 'error',
            'badge-neutral': pipelineStatus === 'idle'
          }"
          x-text="statusLabel()">
        </div>

        <!-- Run buttons -->
        <button class="btn btn-primary btn-sm"
          :disabled="pipelineStatus === 'running'"
          @click="triggerRun(false)">
          <span x-show="pipelineStatus !== 'running'">▶ Chạy ngay</span>
          <span x-show="pipelineStatus === 'running'">
            <span class="loading loading-spinner loading-xs"></span> Đang chạy…
          </span>
        </button>

        <button class="btn btn-outline btn-sm"
          :disabled="pipelineStatus === 'running'"
          @click="triggerRun(true)">
          🔍 Dry Run
        </button>

        <button class="btn btn-ghost btn-sm" @click="refreshStats()">
          🔄 Làm mới
        </button>
      </div>

      <!-- Error message -->
      <div x-show="pipelineError" class="alert alert-error mt-2 py-2 text-sm">
        <span x-text="pipelineError"></span>
      </div>

      <!-- Timing info -->
      <div x-show="lastRunTime" class="text-xs text-base-content/50 mt-1">
        Lần chạy cuối: <span x-text="lastRunTime"></span>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

    <!-- ── Live Log Console ──────────────────────────────── -->
    <div class="card bg-base-300 shadow">
      <div class="card-body p-3">
        <div class="flex items-center justify-between mb-2">
          <h2 class="font-semibold text-sm">📟 Log Console</h2>
          <div class="flex items-center gap-2">
            <span class="badge badge-xs" :class="sseConnected ? 'badge-success' : 'badge-error'"
              x-text="sseConnected ? 'Live' : 'Offline'"></span>
            <button class="btn btn-ghost btn-xs" @click="logs = []">Xóa</button>
          </div>
        </div>
        <div class="log-console bg-neutral text-neutral-content rounded p-2 h-64 overflow-y-auto"
          x-ref="logPanel">
          <template x-if="logs.length === 0">
            <div class="opacity-40 italic text-xs">Chưa có log. Chạy pipeline để xem.</div>
          </template>
          <template x-for="(line, i) in logs" :key="i">
            <div x-text="line"
              :class="line.includes('ERROR') || line.includes('error') ? 'text-error' :
                      line.includes('WARN')  || line.includes('warn')  ? 'text-warning' :
                      'text-neutral-content'">
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- ── Recent Records ────────────────────────────────── -->
    <div class="card bg-base-100 shadow">
      <div class="card-body p-3">
        <div class="flex items-center justify-between mb-2">
          <h2 class="font-semibold text-sm">📄 Hồ sơ gần nhất</h2>
          <a href="/dashboard/records" class="btn btn-ghost btn-xs">Xem tất cả →</a>
        </div>
        <div class="overflow-x-auto">
          <table class="table table-xs">
            <thead>
              <tr>
                <th>Sheet</th>
                <th>Tên người được BH</th>
                <th>Ngày tạo</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="recentRecords.length === 0">
                <tr><td colspan="3" class="text-center opacity-40 italic">Chưa có dữ liệu</td></tr>
              </template>
              <template x-for="r in recentRecords" :key="r.id + r.sheet">
                <tr class="hover">
                  <td>
                    <span class="badge badge-ghost badge-sm" x-text="sheetLabel(r.sheet)"></span>
                  </td>
                  <td x-text="r.data.insured_name || r.data.customer_name || '—'"></td>
                  <td class="text-xs opacity-60" x-text="r.data.created_at ? r.data.created_at.slice(0,16) : '—'"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function dashboard() {
  return {
    stats: {},
    pipelineStatus: 'idle',
    pipelineError: '',
    lastRunTime: '',
    logs: [],
    recentRecords: [],
    sseConnected: false,
    sseSource: null,

    sheetList: [
      { key: 'travel',    label: 'Du lịch' },
      { key: 'health',    label: 'Sức khỏe' },
      { key: 'auto',      label: 'Ô tô' },
      { key: 'motorbike', label: 'Xe máy' },
      { key: 'bhyt_bhxh', label: 'BHYT/BHXH' },
      { key: 'student',   label: 'HSSV' },
    ],

    async init() {
      await Promise.all([this.refreshStats(), this.fetchPipelineStatus(), this.fetchRecentRecords()]);
      this.connectSSE();
      // Poll status every 3s while running
      setInterval(() => {
        if (this.pipelineStatus === 'running') this.fetchPipelineStatus();
      }, 3000);
      // Refresh stats every 30s
      setInterval(() => this.refreshStats(), 30000);
    },

    async refreshStats() {
      try {
        const r = await fetch('/stats');
        if (r.ok) this.stats = await r.json();
      } catch (_) {}
    },

    async fetchPipelineStatus() {
      try {
        const r = await fetch('/pipeline/status');
        if (!r.ok) return;
        const d = await r.json();
        this.pipelineStatus = d.status;
        this.pipelineError = d.error || '';
        if (d.finished_at) this.lastRunTime = d.finished_at.slice(0, 19).replace('T', ' ');
        if (d.status === 'done') await this.refreshStats();
      } catch (_) {}
    },

    async triggerRun(dryRun) {
      try {
        const r = await fetch('/pipeline/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dry_run: dryRun }),
        });
        const d = await r.json();
        if (d.started) {
          this.pipelineStatus = 'running';
          this.pipelineError = '';
          this.logs = [];
        } else {
          alert(d.message || 'Không thể khởi động pipeline.');
        }
      } catch (e) {
        alert('Lỗi kết nối: ' + e.message);
      }
    },

    async fetchRecentRecords() {
      const sheets = ['travel', 'health', 'auto', 'motorbike', 'bhyt_bhxh', 'student'];
      const all = [];
      for (const sheet of sheets) {
        try {
          const r = await fetch(`/records/${sheet}?skip=0&limit=5`);
          if (!r.ok) continue;
          const rows = await r.json();
          all.push(...rows.map(x => ({ ...x, sheet })));
        } catch (_) {}
      }
      all.sort((a, b) => (b.data.created_at || '').localeCompare(a.data.created_at || ''));
      this.recentRecords = all.slice(0, 15);
    },

    connectSSE() {
      if (this.sseSource) this.sseSource.close();
      const es = new EventSource('/pipeline/logs/stream');
      this.sseSource = es;
      es.onopen = () => { this.sseConnected = true; };
      es.onerror = () => { this.sseConnected = false; };
      es.onmessage = (ev) => {
        if (ev.data === '__heartbeat__') return;
        this.logs.push(ev.data);
        if (this.logs.length > 300) this.logs.shift();
        this.$nextTick(() => {
          const el = this.$refs.logPanel;
          if (el) el.scrollTop = el.scrollHeight;
        });
      };
    },

    statusLabel() {
      return { idle: 'Chờ', running: 'Đang chạy', done: 'Hoàn thành', error: 'Lỗi' }[this.pipelineStatus] || this.pipelineStatus;
    },

    sheetLabel(key) {
      return (this.sheetList.find(s => s.key === key) || {}).label || key;
    },
  };
}
</script>
{% endblock %}
