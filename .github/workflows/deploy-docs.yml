name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site_docs/**"
      - "mkdocs.yml"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mkdocs-${{ hashFiles("requirements.txt") }}
          restore-keys: mkdocs-

      - name: Install MkDocs + plugins
        run: pip install "mkdocs-material>=9.5.0" "mkdocs-glightbox>=0.3.5" "mkdocs-mermaid2-plugin>=1.1.1" "pymdown-extensions>=10.3"

      - name: Build and deploy
        run: mkdocs gh-deploy --force --clean
