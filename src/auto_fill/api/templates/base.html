<!DOCTYPE html>
<html lang="vi" data-theme="corporate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AutoFill Cấp Đơn{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .log-console { font-family: "Consolas", "Courier New", monospace; font-size: 0.78rem; }
  </style>
</head>
<body class="bg-base-200 min-h-screen">

  <!-- Navbar -->
  <div class="navbar bg-primary text-primary-content shadow-lg px-4">
    <div class="navbar-start gap-2">
      <span class="text-xl font-bold">🛡️ AutoFill Cấp Đơn</span>
    </div>
    <div class="navbar-center hidden md:flex">
      <ul class="menu menu-horizontal">
        <li><a href="/dashboard" class="{% if active_page == 'dashboard' %}bg-primary-focus rounded-lg{% endif %}">
          📊 Dashboard
        </a></li>
        <li><a href="/dashboard/records" class="{% if active_page == 'records' %}bg-primary-focus rounded-lg{% endif %}">
          📋 Hồ sơ
        </a></li>
      </ul>
    </div>
    <div class="navbar-end">
      <span class="text-sm opacity-80 mr-2" id="navbar-clock"></span>
    </div>
  </div>

  <main class="container mx-auto p-4 max-w-7xl">
    {% block content %}{% endblock %}
  </main>

  <script>
    (function () {
      function tick() {
        const el = document.getElementById('navbar-clock');
        if (el) el.textContent = new Date().toLocaleString('vi-VN');
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
