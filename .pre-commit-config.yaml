repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5.0
          - pydantic-settings>=2.1.0
          - click>=8.1
          - pytest>=7.4
          - types-PyYAML
          - sqlalchemy>=2.0
          - alembic>=1.13
          - pywin32>=306
          - fastapi>=0.109.0

  - repo: local
    hooks:
      - id: pytest
        name: pytest (quick)
        entry: pytest -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
